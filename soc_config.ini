; SOC Level 2 Dashboard Configuration File
; Edit this file to configure your monitoring settings

[splunk]
enabled = true
host = your-splunk-server.com
port = 8088
token = your-splunk-hec-token-here
index = security
sourcetype = soc_dashboard
ssl_verify = false

[alerts]
enabled = true
email_enabled = false
smtp_server = smtp.gmail.com
smtp_port = 587
email_from = soc@yourcompany.com
email_to = security@yourcompany.com
email_password = your-app-password
slack_enabled = false
slack_webhook = https://hooks.slack.com/services/YOUR/WEBHOOK/URL
webhook_enabled = false
webhook_url = https://your-webhook-endpoint.com/alerts

[monitoring]
fim_enabled = true
fim_paths = C:/Windows/System32
fim_interval = 300
process_enabled = true
process_interval = 60
network_enabled = true
network_interval = 60
eventlog_enabled = true
eventlog_interval = 300

[ai]
enabled = true
anomaly_threshold = 0.7
training_window = 100
